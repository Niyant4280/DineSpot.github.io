<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Restaurants - Dine Spot</title>
    <link rel="stylesheet" href="cafe.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <script src="navbar.js" defer></script>
    
    <main>
        <section class="featured-restaurants">
            <h2>Our Featured Restaurants</h2>
            <div class="restaurant-gallery">
                <div class="restaurant-card">
                    <img src="cafe1.jpg" alt="The Messy Door">
                    <h3>The Messy Door</h3>
                    <p class="cuisine">Italian, Mexican</p>
                </div>
                <div class="restaurant-card">
                    <img src="cafe2.jpg" alt="Vivanta Cafe">
                    <h3>Vivanta Cafe</h3>
                    <p class="cuisine">Indian, Thai, and more</p>
                </div>
                <div class="restaurant-card">
                    <img src="cafe3.jpg" alt="Marriott">
                    <h3>Marriott</h3>
                    <p class="cuisine">South Indian, Seafood, Jamaican</p>
                </div>
                <div class="restaurant-card">
                    <img src="cafe4.jpg" alt="Spice Petals">
                    <h3>Spice Petals</h3>
                    <p class="cuisine">Continental, North Indian, Thai</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
