<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Dine Spot</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="contactus.css">
  <script>
    // Function to handle form submission and page refresh
    function submitForm() {
      const form = document.getElementById('contactForm');
      form.addEventListener('submit', (event) => {
        event.preventDefault(); // Prevent default form submission behavior
        fetch(form.action, {
          method: 'POST',
          body: new FormData(form)
        })
          .then(response => {
            if (response.ok) { // Check for successful response
              console.log('Success!', response);
              alert('Message sent successfully!');
              window.location.reload(true); // Refresh the page after successful submission
            } else {
              console.error('Error!', response.statusText);
              alert('An error occurred. Please try again later.');
            }
          })
          .catch(error => {
            console.error('Error!', error.message);
            alert('An error occurred. Please try again later.');
          });
      });
    }

    // Ensure script runs after DOM is fully loaded
    window.onload = function() {
      submitForm(); // Call the submitForm function on page load
    };
  </script>
</head>
<body>
  <section class="contact-section">
    <h1>Contact us</h1>
    <p>Our Team is ready to solve your problems</p>
    <div class="contact-container">
      <div class="form-container">
        <h2>Reach out to us!</h2>
        <p>Got a question about Dine spot? Are you interested in partnering with us? Have some suggestions or just want to say hi? Contact us:</p>
        <form id="contactForm" action="https://sheetdb.io/api/v1/az4kbwpxmlab0" method="POST" onsubmit="return false;">  <input type="text" id="name" name="data[name]" placeholder="Full name" required>
          <input type="email" id="email" name="data[email]" placeholder="Email" required>
          <input type="tel" id="phone" name="data[phone]" placeholder="Phone Number" required>
          <textarea id="message" name="data[message]" placeholder="Message" required></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
      <div class="image-container">
        <img src="contactus.jpg" alt="Team working">
      </div>
    </div>
  </section>
</body>
</html>
