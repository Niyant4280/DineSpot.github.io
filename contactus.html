<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dine Spot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contactus.css">
</head>
<body>
    <section class="contact-section">
        <h1>Contact us</h1>
        <p>Our Team is ready to solve your problems</p>
        <div class="contact-container">
            <div class="form-container">
                <h2>Reach out to us!</h2>
                <p>Got a question about Dine spot? Are you interested in partnering with us? Have some suggestions or just want to say hi? Contact us:</p>
                
                <!-- Form Submission to Google Apps Script -->
                <form id="contactForm" action="https://script.google.com/macros/s/19ps8QjH4VDfmaQSvLxRDwIvEQhpkY44uVqKmcbKHTvI/exec" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                    <input type="text" id="name" name="name" placeholder="Full name" required>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
                    <textarea id="message" name="message" placeholder="Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>

                <!-- Hidden iframe to handle the form submission response -->
                <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { alert('Message sent successfully!'); }"></iframe>
            </div>
            <div class="image-container">
                <img src="contactus.jpg" alt="Team working">
            </div>
        </div>
    </section>

    <!-- JavaScript to handle iframe submission -->
    <script>
        let submitted = false;
    </script>
</body>
</html>
