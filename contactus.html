<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dine Spot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contactus.css">
</head>
<body>
    <section class="contact-section">
        <h1>Contact us</h1>
        <p>Our Team is ready to solve your problems</p>
        <div class="contact-container">
            <div class="form-container">
                <h2>Reach out to us!</h2>
                <p>Got a question about Dine spot? Are you interested in partnering with us? Have some suggestions or just want to say hi? Contact us:</p>
                <form id="contactForm">
                    <input type="text" id="name" name="name" placeholder="Full name" required>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
                    <textarea id="message" name="message" placeholder="Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            <div class="image-container">
                <img src="contactus.jpg" alt="Team working">
            </div>
        </div>
    </section>

    <!-- JavaScript for Form Submission -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent the default form submission

            // Gather form data
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value
            };

            // Send data to Google Apps Script
            fetch('https://script.google.com/macros/s/19ps8QjH4VDfmaQSvLxRDwIvEQhpkY44uVqKmcbKHTvI/exec', { // Replace with your deployment URL
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(result => {
                if (result.result === 'success') {
                    alert('Message sent successfully!');
                } else {
                    alert('There was a problem with the submission.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('There was an error sending your message.');
            });

            // Optionally, reset the form after submission
            form.reset();
        });
    </script>
</body>
</html>
